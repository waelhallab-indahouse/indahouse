<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B1A" />
    <meta name="description" content="Book remote DJs for your private parties and dinners. A live DJ, your speakers, any party." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Indahouse" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Indahouse — Remote DJ Booking" />
    <meta property="og:description" content="A live DJ. Your speakers. Any party." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://indahouse-wheat.vercel.app" />

    <title>Indahouse</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #070D1C;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        /* iOS safe area support */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
